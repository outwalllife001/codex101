# Codex 示例配置文件
# 保存为 ~/.codex/config.toml

################################################################################
# 核心模型设置
################################################################################

# 主模型: gpt-5.4 或 gpt-5.3-codex
model = "gpt-5.4"

# 模型提供商
model_provider = "openai"

# 沟通风格: none | friendly | pragmatic
personality = "pragmatic"

################################################################################
# 推理设置
################################################################################

# 推理力度: minimal | low | medium | high | xhigh
model_reasoning_effort = "medium"

# 规划模式推理力度
plan_mode_reasoning_effort = "high"

# 推理摘要: auto | concise | detailed | none
model_reasoning_summary = "auto"

################################################################################
# 审批与安全
################################################################################

# 审批策略: untrusted | on-request | never
approval_policy = "on-request"

# 沙箱模式: read-only | workspace-write | danger-full-access
sandbox_mode = "read-only"

################################################################################
# 功能开关
################################################################################

# Web 搜索: disabled | cached | live
web_search = "cached"

# 文件打开器: vscode | cursor | windsurf | none
file_opener = "vscode"

